<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Select 交互预览</title>
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #161630;
    --surface-raised: #1e1e3a;
    --primary: #7c5cfc;
    --primary-glow: rgba(124, 92, 252, 0.32);
    --accent: #00d4aa;
    --text: #e8e8f0;
    --text-secondary: #8888aa;
    --text-muted: #5a5a7a;
    --danger: #ff5252;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }

  .shell {
    height: 100vh;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
  }

  .header {
    min-height: 52px;
    padding: 0 24px;
    background: var(--surface);
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .brand-mark {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background:
      linear-gradient(135deg, rgba(124, 92, 252, 0.95), rgba(0, 212, 170, 0.9));
    box-shadow: 0 0 18px rgba(124, 92, 252, 0.28);
  }

  h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 650;
    letter-spacing: 0;
    white-space: nowrap;
  }

  .nav-pill {
    justify-self: center;
    padding: 5px 12px;
    border-radius: 6px;
    background: rgba(124, 92, 252, 0.14);
    border: 1px solid rgba(124, 92, 252, 0.32);
    color: var(--text);
    font-size: 12px;
  }

  .status {
    justify-self: end;
    color: var(--text-secondary);
    font-size: 12px;
  }

  .toolbar {
    min-height: 44px;
    padding: 8px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px 14px;
    color: var(--text-secondary);
    font-size: 13px;
  }

  kbd {
    min-width: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface-raised);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: var(--text);
    font: inherit;
    font-size: 12px;
  }

  .workspace {
    min-height: 0;
    display: grid;
    place-items: center;
    padding: 14px 24px 10px;
  }

  .canvas-wrapper {
    position: relative;
    width: min(900px, calc(100vw - 48px));
    aspect-ratio: 900 / 560;
    max-height: calc(100vh - 206px);
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background:
      linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      #0a0a14;
    background-size: 28px 28px, 28px 28px, auto;
    box-shadow: 0 0 60px rgba(124, 92, 252, 0.06);
    overflow: hidden;
    cursor: default;
    touch-action: none;
    user-select: none;
  }

  .canvas-inner {
    position: absolute;
    inset: 0;
    width: 900px;
    height: 560px;
    transform-origin: top left;
  }

  .bounding-box {
    position: absolute;
    border: 2px solid rgba(124, 92, 252, 0.48);
    background: rgba(124, 92, 252, 0.055);
    border-radius: 4px;
    display: grid;
    place-items: center;
    transition: border-color 0.14s, background 0.14s, box-shadow 0.14s;
    user-select: none;
    cursor: grab;
  }

  .bounding-box:active {
    cursor: grabbing;
  }

  .bounding-box.selected {
    border-color: var(--primary);
    background: rgba(124, 92, 252, 0.13);
    box-shadow:
      0 0 18px var(--primary-glow),
      inset 0 0 18px rgba(124, 92, 252, 0.05);
  }

  .bounding-box .label {
    max-width: 100%;
    padding: 4px 8px;
    color: var(--text);
    font-size: 12px;
    line-height: 1.3;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
  }

  .marquee-selection {
    position: absolute;
    min-width: 1px;
    min-height: 1px;
    background: rgba(124, 92, 252, 0.08);
    border-radius: 3px;
    pointer-events: none;
    z-index: 20;
  }

  .marquee-ants {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .marquee-ants-path {
    fill: none;
    stroke: var(--primary);
    stroke-width: 2;
    stroke-dasharray: 6 4;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
    animation: marquee-ants 0.48s linear infinite;
  }

  @keyframes marquee-ants {
    to { stroke-dashoffset: -10; }
  }

  @media (prefers-reduced-motion: reduce) {
    .marquee-ants-path {
      animation: none;
    }
  }

  .footer {
    min-height: 78px;
    padding: 10px 24px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 18px;
  }

  .info {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px 18px;
    color: var(--text-secondary);
    font-size: 13px;
    min-width: 0;
  }

  .count {
    color: var(--primary);
    font-weight: 750;
    font-size: 15px;
  }

  .selection-list {
    min-width: 180px;
    color: var(--text);
  }

  .legend {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px 18px;
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--text-secondary);
    font-size: 12px;
  }

  .legend-dot {
    width: 11px;
    height: 11px;
    border-radius: 3px;
    flex: 0 0 auto;
  }

  .normal-dot {
    border: 1.5px solid rgba(124, 92, 252, 0.48);
    background: rgba(124, 92, 252, 0.06);
  }

  .selected-dot {
    border: 1.5px solid var(--primary);
    background: rgba(124, 92, 252, 0.22);
    box-shadow: 0 0 7px var(--primary-glow);
  }

  .marquee-dot {
    border: 0;
    background:
      linear-gradient(90deg, var(--primary) 50%, transparent 0) top / 8px 2px repeat-x,
      linear-gradient(90deg, var(--primary) 50%, transparent 0) bottom / 8px 2px repeat-x,
      linear-gradient(0deg, var(--primary) 50%, transparent 0) left / 2px 8px repeat-y,
      linear-gradient(0deg, var(--primary) 50%, transparent 0) right / 2px 8px repeat-y;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }

  button {
    min-height: 31px;
    padding: 0 12px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font: inherit;
    font-size: 12px;
  }

  button:hover {
    border-color: rgba(124, 92, 252, 0.72);
    background: rgba(124, 92, 252, 0.11);
  }

  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
<body>
<div class="shell">
  <header class="header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <h1>Ideogram Editor</h1>
    </div>
    <div class="nav-pill">Multi-Select 交互预览</div>
    <div class="status" id="modeStatus">就绪</div>
  </header>

  <div class="toolbar">
    <span><kbd>Ctrl</kbd>/<kbd>Cmd</kbd>/<kbd>Shift</kbd> + 拖拽框选</span>
    <span><kbd>Ctrl</kbd>/<kbd>Cmd</kbd>/<kbd>Shift</kbd> + 点击切换选择</span>
    <span>拖拽已选 box 批量移动</span>
  </div>

  <main class="workspace">
    <div class="canvas-wrapper" id="canvasWrapper" aria-label="多选交互画布">
      <div class="canvas-inner" id="canvasInner"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="info">
      <span>选中：<strong class="count" id="selCount">0</strong> 个元素</span>
      <span class="selection-list" id="selInfo">无</span>
      <div class="legend" aria-hidden="true">
        <span class="legend-item"><span class="legend-dot normal-dot"></span>普通 box</span>
        <span class="legend-item"><span class="legend-dot selected-dot"></span>选中 box</span>
        <span class="legend-item"><span class="legend-dot marquee-dot"></span>SVG 蚂蚁线</span>
      </div>
    </div>
    <div class="controls">
      <button type="button" id="btnResetSelection">重置选中</button>
      <button type="button" id="btnClearSelection">清空选择</button>
      <button type="button" id="btnResetLayout">恢复布局</button>
    </div>
  </footer>
</div>

<script>
  const initialBoxes = [
    { id: 'box_1', x: 60,  y: 60,  w: 180, h: 120, label: 'Box 1 · 人物' },
    { id: 'box_2', x: 280, y: 40,  w: 200, h: 100, label: 'Box 2 · 背景' },
    { id: 'box_3', x: 540, y: 70,  w: 160, h: 140, label: 'Box 3 · 前景' },
    { id: 'box_4', x: 80,  y: 240, w: 140, h: 160, label: 'Box 4 · 装饰' },
    { id: 'box_5', x: 280, y: 200, w: 220, h: 130, label: 'Box 5 · 文字' },
    { id: 'box_6', x: 560, y: 260, w: 180, h: 150, label: 'Box 6 · 特效' },
    { id: 'box_7', x: 120, y: 440, w: 260, h: 80,  label: 'Box 7 · 底部' },
    { id: 'box_8', x: 440, y: 440, w: 200, h: 80,  label: 'Box 8 · 边框' },
  ];

  const canvasWrapper = document.getElementById('canvasWrapper');
  const canvasInner = document.getElementById('canvasInner');
  const selCount = document.getElementById('selCount');
  const selInfo = document.getElementById('selInfo');
  const modeStatus = document.getElementById('modeStatus');
  const baseCanvas = { w: 900, h: 560 };
  const moveThreshold = 4;

  let boxes = cloneBoxes(initialBoxes);
  let selectedIds = ['box_1', 'box_2', 'box_5'];
  let interaction = { mode: 'idle' };

  function cloneBoxes(source) {
    return source.map(box => ({ ...box }));
  }

  function getScale() {
    const width = canvasWrapper.getBoundingClientRect().width || baseCanvas.w;
    return width / baseCanvas.w;
  }

  function syncCanvasScale() {
    const scale = getScale();
    canvasInner.style.transform = `scale(${scale})`;
  }

  function pointFromEvent(event) {
    const rect = canvasWrapper.getBoundingClientRect();
    const scale = getScale();
    return {
      x: (event.clientX - rect.left) / scale,
      y: (event.clientY - rect.top) / scale,
    };
  }

  function hasSelectionModifier(event) {
    return event.ctrlKey || event.metaKey || event.shiftKey;
  }

  function hitBoxAt(point) {
    for (let i = boxes.length - 1; i >= 0; i--) {
      const box = boxes[i];
      if (
        point.x >= box.x &&
        point.x <= box.x + box.w &&
        point.y >= box.y &&
        point.y <= box.y + box.h
      ) {
        return box;
      }
    }
    return null;
  }

  function rectFromPoints(a, b) {
    const x = Math.min(a.x, b.x);
    const y = Math.min(a.y, b.y);
    return {
      x,
      y,
      w: Math.abs(b.x - a.x),
      h: Math.abs(b.y - a.y),
    };
  }

  function boxesOverlap(a, b) {
    return !(
      a.x + a.w < b.x ||
      b.x + b.w < a.x ||
      a.y + a.h < b.y ||
      b.y + b.h < a.y
    );
  }

  function setSelected(ids) {
    selectedIds = Array.from(new Set(ids));
    render();
  }

  function toggleSelected(id) {
    if (selectedIds.includes(id)) {
      setSelected(selectedIds.filter(selectedId => selectedId !== id));
    } else {
      setSelected([...selectedIds, id]);
    }
  }

  function updateInfo() {
    selCount.textContent = String(selectedIds.length);
    if (selectedIds.length === 0) {
      selInfo.textContent = '无';
      return;
    }
    const names = selectedIds
      .map(id => boxes.find(box => box.id === id)?.label.split(' · ')[0])
      .filter(Boolean);
    selInfo.textContent = names.join(', ');
  }

  function renderBoxes() {
    boxes.forEach(box => {
      const div = document.createElement('div');
      div.className = `bounding-box${selectedIds.includes(box.id) ? ' selected' : ''}`;
      div.id = box.id;
      div.dataset.boxId = box.id;
      div.style.left = `${box.x}px`;
      div.style.top = `${box.y}px`;
      div.style.width = `${box.w}px`;
      div.style.height = `${box.h}px`;
      div.innerHTML = `<span class="label">${box.label}</span>`;
      canvasInner.appendChild(div);
    });
  }

  function renderMarquee(rect) {
    if (!rect || rect.w < 1 || rect.h < 1) return;
    const div = document.createElement('div');
    div.className = 'marquee-selection';
    div.style.left = `${rect.x}px`;
    div.style.top = `${rect.y}px`;
    div.style.width = `${rect.w}px`;
    div.style.height = `${rect.h}px`;
    div.innerHTML = `
      <svg class="marquee-ants" viewBox="0 0 ${rect.w} ${rect.h}" preserveAspectRatio="none" aria-hidden="true">
        <rect class="marquee-ants-path" x="1" y="1" width="${Math.max(0, rect.w - 2)}" height="${Math.max(0, rect.h - 2)}" rx="2" ry="2"></rect>
      </svg>
    `;
    canvasInner.appendChild(div);
  }

  function render() {
    syncCanvasScale();
    canvasInner.replaceChildren();
    renderBoxes();
    if (interaction.mode === 'marqueeSelect') {
      renderMarquee(rectFromPoints(interaction.start, interaction.current));
    }
    updateInfo();
    modeStatus.textContent = interaction.mode === 'idle'
      ? '就绪'
      : interaction.mode === 'dragging'
        ? '批量移动中'
        : interaction.mode === 'pendingSelection'
          ? '准备框选'
          : '框选中';
  }

  function startDrag(point, hitBox) {
    const shouldDragGroup = selectedIds.includes(hitBox.id) && selectedIds.length > 1;
    const dragIds = shouldDragGroup ? [...selectedIds] : [hitBox.id];
    if (!shouldDragGroup) selectedIds = [hitBox.id];
    interaction = {
      mode: 'dragging',
      start: point,
      ids: dragIds,
      originals: boxes
        .filter(box => dragIds.includes(box.id))
        .map(box => ({ id: box.id, x: box.x, y: box.y })),
    };
    render();
  }

  canvasWrapper.addEventListener('pointerdown', event => {
    if (event.button !== 0) return;
    const point = pointFromEvent(event);
    const hitBox = hitBoxAt(point);

    if (hasSelectionModifier(event)) {
      event.preventDefault();
      interaction = {
        mode: 'pendingSelection',
        start: point,
        current: point,
        hitBoxId: hitBox?.id || null,
      };
      canvasWrapper.setPointerCapture?.(event.pointerId);
      render();
      return;
    }

    if (hitBox) {
      event.preventDefault();
      startDrag(point, hitBox);
      canvasWrapper.setPointerCapture?.(event.pointerId);
      return;
    }

    setSelected([]);
  });

  canvasWrapper.addEventListener('pointermove', event => {
    if (interaction.mode === 'idle') return;
    const point = pointFromEvent(event);

    if (interaction.mode === 'pendingSelection') {
      const dx = point.x - interaction.start.x;
      const dy = point.y - interaction.start.y;
      if (Math.hypot(dx, dy) <= moveThreshold) return;
      interaction = {
        ...interaction,
        mode: 'marqueeSelect',
        current: point,
      };
      render();
      return;
    }

    if (interaction.mode === 'marqueeSelect') {
      interaction.current = point;
      render();
      return;
    }

    if (interaction.mode === 'dragging') {
      const dx = point.x - interaction.start.x;
      const dy = point.y - interaction.start.y;
      boxes = boxes.map(box => {
        const original = interaction.originals.find(item => item.id === box.id);
        if (!original) return box;
        return {
          ...box,
          x: original.x + dx,
          y: original.y + dy,
        };
      });
      render();
    }
  });

  canvasWrapper.addEventListener('pointerup', event => {
    if (interaction.mode === 'pendingSelection') {
      if (interaction.hitBoxId) {
        const id = interaction.hitBoxId;
        interaction = { mode: 'idle' };
        toggleSelected(id);
        return;
      }
      interaction = { mode: 'idle' };
      render();
      return;
    }

    if (interaction.mode === 'marqueeSelect') {
      const rect = rectFromPoints(interaction.start, interaction.current);
      const overlappingIds = boxes
        .filter(box => boxesOverlap(rect, box))
        .map(box => box.id);
      interaction = { mode: 'idle' };
      setSelected(overlappingIds);
      return;
    }

    if (interaction.mode === 'dragging') {
      interaction = { mode: 'idle' };
      render();
    }
  });

  canvasWrapper.addEventListener('pointercancel', () => {
    interaction = { mode: 'idle' };
    render();
  });

  document.getElementById('btnResetSelection').addEventListener('click', () => {
    setSelected(['box_1', 'box_2', 'box_5']);
  });

  document.getElementById('btnClearSelection').addEventListener('click', () => {
    setSelected([]);
  });

  document.getElementById('btnResetLayout').addEventListener('click', () => {
    boxes = cloneBoxes(initialBoxes);
    setSelected(['box_1', 'box_2', 'box_5']);
  });

  window.addEventListener('resize', render);
  render();
</script>
</body>
</html>
